<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>OCN Web EFB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      background: #050814;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    .navbar {
      display: flex;
      background: #0b1020;
      padding: 10px;
      gap: 10px;
      border-bottom: 1px solid #1b2238;
    }
    .navbar button {
      background: #050814;
      border: 1px solid #27314a;
      color: #fff;
      padding: 8px 14px;
      border-radius: 6px;
      cursor: pointer;
    }
    .navbar button:hover {
      background: #2aa9ff;
      border-color: #2aa9ff;
    }
    .container {
      padding: 20px;
    }
    .title {
      font-size: 22px;
      margin-bottom: 10px;
    }
    .input-row {
      margin-top: 20px;
    }
    input {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #27314a;
      background: #0b1020;
      color: #fff;
    }
    button.primary {
      background: #2aa9ff;
      border-color: #2aa9ff;
      margin-left: 10px;
    }
  </style>
</head>
<body>

  <div class="navbar">
    <button onclick="window.location.href='index.html'">Home</button>
    <button onclick="window.location.href='map.html'">Live Map</button>
    <button onclick="window.location.href='fleet.html'">Fleet</button>
    <button onclick="window.location.href='maintenance.html'">Maintenance</button>
  </div>

  <div class="container">
    <div class="title">OCN Web EFB – Home</div>

    <p>Willkommen im OCN EFB. Du kannst dich mit deiner <b>SimBrief UserID</b> einloggen.</p>

    <div class="input-row">
      <input id="pilotIdInput" placeholder="SimBrief UserID" />
      <button class="primary" id="loginBtn">Login</button>
    </div>

    <p id="loginStatus" style="margin-top:20px; color:#2aa9ff;"></p>
  </div>

  <script>
    const el = (id) => document.getElementById(id);

    el("loginBtn").addEventListener("click", async () => {
      const id = el("pilotIdInput").value.trim();
      if (!id) return;

      const res = await fetch(`https://www.simbrief.com/api/xml.fetcher.php?userid=${id}`);
      const text = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");

      const pilotName = xml.querySelector("general")?.querySelector("pilot_name")?.textContent || "SimBrief Pilot";

      el("loginStatus").textContent = `Logged in as ${pilotName} (SimBrief ID: ${id})`;
    });
  </script>

</body>
</html>
