<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>OCN Web EFB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0b0e19;
      color: #fff;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #0f1324;
      border-right: 1px solid #1d2338;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar img {
      width: 150px;
      margin-bottom: 25px;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      color: #c7cbe0;
      font-size: 14px;
      width: 100%;
      text-align: left;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: #1a2038;
      border-left: 3px solid #2aa9ff;
      color: #fff;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Header Banner */
    .banner {
      background: url('https://images.pexels.com/photos/358319/pexels-photo-358319.jpeg') center/cover no-repeat;
      height: 180px;
      position: relative;
      border-bottom: 1px solid #1d2338;
    }

    .banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .banner-title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .pilot-box {
      text-align: right;
      font-size: 14px;
      color: #d0d4e6;
    }

    .pilot-box b {
      color: #fff;
      font-size: 16px;
    }

    /* Content Area */
    .content {
      padding: 20px;
    }

    .card {
      background: #111627;
      border: 1px solid #1d2338;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #2aa9ff;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #27314a;
      background: #0b1020;
      color: #fff;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #2aa9ff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background: #58bfff;
    }

    #ofpBox p {
      margin: 4px 0;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <img src="vocn-logo.png">
