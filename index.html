<script>
  const el = (id) => document.getElementById(id);

  el("loginBtn").addEventListener("click", async () => {
    const username = el("pilotIdInput").value.trim();

    if (!username) {
      el("loginStatus").textContent = "Bitte SimBrief Username eingeben.";
      return;
    }

    el("loginStatus").textContent = "Lade OFP...";
    el("ofpBox").innerHTML = "Lade Daten...";

    try {
      const res = await fetch(`https://www.simbrief.com/api/xml.fetcher.php?username=${encodeURIComponent(username)}`);

      if (!res.ok) {
        throw new Error("HTTP Fehler: " + res.status);
      }

      const text = await res.text();

      if (!text || text.includes("Error")) {
        throw new Error("Kein OFP gefunden oder falscher Username.");
      }

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");

      const parseError = xml.querySelector("parsererror");
      if (parseError) {
        throw new Error("XML Parsing Fehler.");
      }

      const general = xml.querySelector("general");
      const weights = xml.querySelector("weights");
      const times = xml.querySelector("times");

      if (!general) {
        throw new Error("Ungültiger Username oder kein OFP vorhanden.");
      }

      const pilotName = general.querySelector("pilot_name")?.textContent || username;
      const flightNumber = general.querySelector("flight_number")?.textContent || "N/A";
      const dep = general.querySelector("origin")?.textContent || "N/A";
      const arr = general.querySelector("destination")?.textContent || "N/A";
      const route = general.querySelector("route")?.textContent || "N/A";

      const pax = weights?.querySelector("pax_count")?.textContent || "0";
      const cargo = weights?.querySelector("cargo")?.textContent || "0";
      const blockFuel = weights?.querySelector("block_fuel")?.textContent || "0";

      const etd = times?.querySelector("est_out")?.textContent || "N/A";
      const eta = times?.querySelector("est_in")?.textContent || "N/A";

      // Header aktualisieren
      el("pilotNameBox").textContent = pilotName;
      el("pilotIdBox").textContent = "SimBrief: " + username;

      el("loginStatus").textContent = `OFP geladen für Flug ${flightNumber}`;

      el("ofpBox").innerHTML = `
        <p><b>Flug:</b> ${flightNumber}</p>
        <p><b>Route:</b> ${dep} → ${arr}</p>
        <p><b>Routing:</b> ${route}</p>
        <p><b>Pax:</b> ${pax}</p>
        <p><b>Cargo:</b> ${cargo} kg</p>
        <p><b>Block Fuel:</b> ${blockFuel} kg</p>
        <p><b>ETD:</b> ${etd}</p>
        <p><b>ETA:</b> ${eta}</p>
      `;

      // Username speichern
      localStorage.setItem("simbrief_username", username);

    } catch (err) {
      console.error(err);
      el("loginStatus").textContent = "Fehler beim Laden des OFP.";
      el("ofpBox").innerHTML = `<p style="color:#ff6b6b;">${err.message}</p>`;
    }
  });

  // Auto-Login falls gespeichert
  window.addEventListener("load", () => {
    const saved = localStorage.getItem("simbrief_username");
    if (saved) {
      el("pilotIdInput").value = saved;
      el("loginBtn").click();
    }
  });
</script>
