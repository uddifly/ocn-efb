<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>OCN Web EFB</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      background: #0b0e19;
      color: #fff;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #0f1324;
      border-right: 1px solid #1d2338;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
    }

    .sidebar h2 {
      text-align: center;
      font-size: 18px;
      margin-bottom: 20px;
      color: #2aa9ff;
      letter-spacing: 1px;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      color: #c7cbe0;
      font-size: 14px;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: #1a2038;
      border-left: 3px solid #2aa9ff;
      color: #fff;
    }

    /* Main Content */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    /* Header Banner */
    .banner {
      background: url('https://images.pexels.com/photos/358319/pexels-photo-358319.jpeg') center/cover no-repeat;
      height: 180px;
      position: relative;
      border-bottom: 1px solid #1d2338;
    }

    .banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .banner-title {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .pilot-box {
      text-align: right;
      font-size: 14px;
      color: #d0d4e6;
    }

    .pilot-box b {
      color: #fff;
      font-size: 16px;
    }

    /* Content Area */
    .content {
      padding: 20px;
    }

    .card {
      background: #111627;
      border: 1px solid #1d2338;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #2aa9ff;
    }

    input {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #27314a;
      background: #0b1020;
      color: #fff;
      width: 200px;
    }

    button {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      background: #2aa9ff;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {
      background: #58bfff;
    }

    #ofpBox p {
      margin: 4px 0;
    }
  </style>
</head>

<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>OCN EFB</h2>
    <div class="nav-item" onclick="window.location.href='index.html'">Dashboard</div>
    <div class="nav-item" onclick="window.location.href='map.html'">Live Map</div>
    <div class="nav-item" onclick="window.location.href='fleet.html'">Fleet</div>
    <div class="nav-item" onclick="window.location.href='maintenance.html'">Maintenance</div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- Banner -->
    <div class="banner">
      <div class="banner-overlay">
        <div class="banner-title">vOCN · Discover Virtual</div>
        <div class="pilot-box">
          <b id="pilotNameBox">Pilot Offline</b><br>
          <span id="pilotIdBox">Bitte einloggen</span>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="content">

      <div class="card">
        <h3>SimBrief Login</h3>
        <p>Gib deine <b>SimBrief UserID</b> ein, um OFP‑Daten zu laden.</p>

        <input id="pilotIdInput" placeholder="SimBrief UserID">
        <button id="loginBtn">Login</button>

        <p id="loginStatus"></p>
      </div>

      <div class="card">
        <h3>OFP Daten</h3>
        <div id="ofpBox">Noch keine Daten geladen.</div>
      </div>

    </div>
  </div>

  <script>
    const el = (id) => document.getElementById(id);

    el("loginBtn").addEventListener("click", async () => {
      const id = el("pilotIdInput").value.trim();
      if (!id) return;

      const res = await fetch(`https://www.simbrief.com/api/xml.fetcher.php?userid=${id}`);
      const text = await res.text();

      const parser = new DOMParser();
      const xml = parser.parseFromString(text, "text/xml");

      const general = xml.querySelector("general");
      const aircraft = xml.querySelector("aircraft");
      const weights = xml.querySelector("weights");
      const times = xml.querySelector("times");

      const pilotName = general?.querySelector("pilot_name")?.textContent || "SimBrief Pilot";
      const flightNumber = general?.querySelector("flight_number")?.textContent || "N/A";
      const dep = general?.querySelector("origin")?.textContent || "N/A";
      const arr = general?.querySelector("destination")?.textContent || "N/A";
      const route = general?.querySelector("route")?.textContent || "N/A";

      const pax = weights?.querySelector("pax_count")?.textContent || "0";
      const cargo = weights?.querySelector("cargo")?.textContent || "0";
      const blockFuel = weights?.querySelector("block_fuel")?.textContent || "0";

      const etd = times?.querySelector("est_out")?.textContent || "N/A";
      const eta = times?.querySelector("est_in")?.textContent || "N/A";

      el("pilotNameBox").textContent = pilotName;
      el("pilotIdBox").textContent = "SimBrief ID: " + id;

      el("loginStatus").textContent = `OFP geladen für Flug ${flightNumber}`;

      el("ofpBox").innerHTML = `
        <p><b>Flug:</b> ${flightNumber}</p>
        <p><b>Route:</b> ${dep} → ${arr}</p>
        <p><b>Routing:</b> ${route}</p>
        <p><b>Pax:</b> ${pax}</p>
        <p><b>Cargo:</b> ${cargo} kg</p>
        <p><b>Block Fuel:</b> ${blockFuel} kg</p>
        <p><b>ETD:</b> ${etd}</p>
        <p><b>ETA:</b> ${eta}</p>
      `;
    });
  </script>

</body>
</html>
