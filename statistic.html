<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>OCN Statistics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: #0b0e19;
      color: #fff;
      font-family: "Segoe UI", Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 240px;
      background: #0f1324;
      border-right: 1px solid #1d2338;
      padding-top: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sidebar img {
      width: 120px;
      margin-bottom: 20px;
    }

    .nav-item {
      padding: 12px 20px;
      cursor: pointer;
      color: #c7cbe0;
      font-size: 14px;
      width: 100%;
      text-align: left;
      border-left: 3px solid transparent;
    }

    .nav-item:hover {
      background: #1a2038;
      border-left: 3px solid #2aa9ff;
      color: #fff;
    }

    .main {
      flex: 1;
      overflow-y: auto;
    }

    .banner {
      background: url('https://images.pexels.com/photos/358319/pexels-photo-358319.jpeg') center/cover no-repeat;
      height: 160px;
      position: relative;
      border-bottom: 1px solid #1d2338;
    }

    .banner-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
      font-size: 24px;
      font-weight: 600;
    }

    .content {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 20px;
    }

    .card {
      background: #111627;
      border: 1px solid #1d2338;
      border-radius: 8px;
      padding: 20px;
    }

    .card h3 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #2aa9ff;
    }

    .stat-number {
      font-size: 32px;
      font-weight: 700;
      margin-top: 10px;
    }

    .bar {
      height: 10px;
      background: #2aa9ff;
      border-radius: 4px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="sidebar">
    <img src="logo.png">
    <div class="nav-item" onclick="window.location.href='index.html'">Dashboard</div>
    <div class="nav-item" onclick="window.location.href='statistics.html'">Statistics</div>
    <div class="nav-item" onclick="window.location.href='timeline.html'">Timeline</div>
    <div class="nav-item" onclick="window.location.href='fleet.html'">Fleet</div>
    <div class="nav-item" onclick="window.location.href='maintenance.html'">Maintenance</div>
  </div>

  <div class="main">
    <div class="banner">
      <div class="banner-overlay">Pilot Statistics</div>
    </div>

    <div class="content">

      <div class="grid">
        <div class="card">
          <h3>PIREPs</h3>
          <div class="stat-number" id="pireps">103</div>
        </div>

        <div class="card">
          <h3>Gesamtflugzeit</h3>
          <div class="stat-number" id="hours">433h 35m</div>
        </div>

        <div class="card">
          <h3>Geflogene NM</h3>
          <div class="stat-number" id="nm">176,296</div>
        </div>

        <div class="card">
          <h3>Punkte</h3>
          <div class="stat-number" id="points">56,710</div>
        </div>

        <div class="card">
          <h3>Ø Landung</h3>
          <div class="stat-number" id="landing">-171 FPM</div>
        </div>
      </div>

      <div class="card" style="margin-top: 20px;">
        <h3>Flüge der letzten 30 Tage</h3>
        <div class="bar" style="width: 70%;"></div>
      </div>

    </div>
  </div>

</body>
</html>
